<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>U = F(U, U) • Simplified Renormalization Flow</title>
<script src="https://cdn.plot.ly/plotly-2.28.0.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600&display=swap');
  :root {
    --bg: #04080e; --accent: #06b6d4; --gold: #f59e0b;
  }
  body {
    margin:0; padding:0; background:var(--bg); color:#e2e8f0;
    font-family:'Share Tech Mono',monospace; height:100vh; overflow:hidden;
    display:flex; flex-direction:column;
  }
  #header {
    padding:15px 20px; background:#0a1420; border-bottom:2px solid var(--accent);
    font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700;
    letter-spacing:2px; text-align:center; color:var(--gold);
  }
  #main {
    flex:1; padding:20px; display:flex; flex-direction:column;
    background:#0a1420;
  }
  #plot {
    flex:1; border:2px solid var(--accent); border-radius:8px; background:#0f1c2e;
  }
  #controls {
    margin-top:15px; text-align:center;
  }
  button {
    background:var(--gold); color:#04080e; border:none; padding:14px 32px;
    font-size:16px; font-weight:bold; border-radius:6px; cursor:pointer;
    box-shadow:0 0 20px rgba(245,158,11,0.6);
  }
  button:hover { background:#f59e0b; }
  #info {
    margin-top:10px; font-size:13px; color:#94a3b8; text-align:center;
    line-height:1.4;
  }
  .footer {
    padding:12px; background:#0a1420; font-size:10px; text-align:center;
    color:#64748b;
  }
</style>
</head>
<body>

<div id="header">U = F(U, U) — RENORMALIZATION FLOW</div>

<div id="main">
  <div id="plot"></div>
  
  <div id="controls">
    <button id="play-btn">▶ START RENORMALIZATION FLOW</button>
  </div>
  
  <div id="info">
    Micro-basins (fine scale) → coarse-graining → macro manifold<br>
    Plasma fold • Russell waveform • 𝔽₁₇ • Tuttle’s Triad
  </div>
</div>

<div class="footer">
  Simplified version • Click button to watch the recursive binary fold renormalize
</div>

<script>
// Very simple 2D animated renormalization flow
const plotDiv = document.getElementById('plot');

let depth = 12;
let history = [];

function createInitialData() {
  history = [];
  let dn = 2, E = 1;
  for (let d = 0; d <= depth; d++) {
    history.push({d, dn, E});
    // Simple plasma fold
    const dn_new = (dn + dn + 3 * E * E) % 17;
    const E_new  = (E + E + 5 * (dn - dn) + 2 * 11) % 17;
    // Add irreversibility + noise
    dn = (dn_new + (Math.random()*2 - 1)) % 17;
    E  = (E_new + (Math.random()*2 - 1)) % 17;
  }
}

createInitialData();

const traceDN = {
  x: history.map(h => h.d),
  y: history.map(h => h.dn),
  mode: 'lines+markers',
  name: 'δn (density)',
  line: { color: '#06b6d4', width: 4 }
};

const traceE = {
  x: history.map(h => h.d),
  y: history.map(h => h.E),
  mode: 'lines+markers',
  name: 'E (field)',
  line: { color: '#f59e0b', width: 4 }
};

const layout = {
  title: {
    text: 'Animated Renormalization Flow — U = F(U, U)',
    font: { size: 18, color: '#e2e8f0' }
  },
  paper_bgcolor: '#0f1c2e',
  plot_bgcolor: '#0f1c2e',
  font: { color: '#e2e8f0', family: 'Share Tech Mono' },
  xaxis: { title: 'Recursion Depth (Fine → Macro)', range: [0,12], gridcolor: '#1e293b' },
  yaxis: { title: 'Value mod 17', range: [0,16], gridcolor: '#1e293b' },
  legend: { orientation: 'h', y: 1.1 }
};

Plotly.newPlot(plotDiv, [traceDN, traceE], layout);

// Animation function
let animationFrame = 0;
function animate() {
  if (animationFrame > 12) return;
  
  depth = 12 - animationFrame;
  createInitialData(); // regenerate up to current depth
  
  const newX = history.map(h => h.d);
  const newYDN = history.map(h => h.dn);
  const newYE = history.map(h => h.E);
  
  Plotly.animate(plotDiv, {
    data: [
      { x: newX, y: newYDN },
      { x: newX, y: newYE }
    ],
    traces: [0, 1]
  }, {
    transition: { duration: 120 },
    frame: { duration: 120 }
  });
  
  animationFrame++;
  setTimeout(animate, 280);
}

// Button
document.getElementById('play-btn').addEventListener('click', function() {
  const btn = this;
  if (btn.textContent.includes('START') || btn.textContent.includes('RESTART')) {
    btn.textContent = '⏸ RUNNING...';
    animationFrame = 0;
    createInitialData();
    Plotly.react(plotDiv, [traceDN, traceE], layout);
    animate();
  } else {
    btn.textContent = '▶ RESTART FLOW';
  }
});

console.log('%c✅ Simplified Renormalization Flow Loaded — Click START', 'color:#06b6d4; font-family:monospace;');
</script>
</body>
</html>
